<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>MicroDAO Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f4f4f5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 30% 20%, rgba(59, 91, 219, 0.18), transparent 32%),
          linear-gradient(180deg, #111118 0%, #09090b 100%);
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 12px;
        padding: 24px;
        background: rgba(15, 15, 20, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      img {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        object-fit: cover;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: #a1a1aa;
        line-height: 1.55;
        font-size: 14px;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #3b5bdb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192x192.png" alt="MicroDAO" />
      <h1>Немає з'єднання</h1>
      <p>
        MicroDAO відкриє збережену версію, щойно мережа повернеться. Перевірте підключення й
        спробуйте ще раз.
      </p>
      <p>MicroDAO will continue when your connection is back.</p>
      <button type="button" onclick="window.location.reload()">Спробувати знову</button>
    </main>
  </body>
</html>
